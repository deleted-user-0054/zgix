name: Benchmark - zono vs merjs vs Hono vs Next.js

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  ZONO_ZIG_VERSION: 0.16.0
  MERJS_ZIG_VERSION: 0.16.0
  MERJS_BASELINE_REF: v0.2.5
  BUN_VERSION: latest
  BENCH_THREADS: 2
  BENCH_CONNECTIONS: 100
  BENCH_DURATION_SECONDS: 10
  BENCH_WARMUP_SECONDS: 3
  BENCH_RUNS: 3

jobs:
  benchmark_zono:
    runs-on: ubuntu-latest
    name: zono API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      binary_size: ${{ steps.bench.outputs.binary_size }}
      binary_bytes: ${{ steps.bench.outputs.binary_bytes }}
      source_files: ${{ steps.bench.outputs.source_files }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      requests_per_sec_context: ${{ steps.bench.outputs.requests_per_sec_context }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      avg_latency_context: ${{ steps.bench.outputs.avg_latency_context }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      zig_version: ${{ steps.bench.outputs.zig_version }}

    steps:
      - name: Checkout zono
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZONO_ZIG_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark zono
        id: bench
        env:
          ZONO_ZIG_VERSION: ${{ env.ZONO_ZIG_VERSION }}
        run: |
          set -euo pipefail

          read_rss_kb() {
            local pid="$1"
            local rss
            rss=$(ps -o rss= -p "$pid" 2>/dev/null | tr -d ' ')
            if [ -z "$rss" ]; then
              echo 0
            else
              echo "$rss"
            fi
          }

          START=$(date +%s%N)
          zig build example-benchmark -Doptimize=ReleaseFast
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          ZONO_BIN=$(python3 - <<'PY'
          from pathlib import Path

          candidates = []
          for path in Path(".zig-cache").rglob("*"):
              if path.is_file() and path.name in {"zono-benchmark", "zono-benchmark.exe"}:
                  candidates.append(path)

          candidates.sort(key=lambda p: p.stat().st_mtime, reverse=True)
          print(candidates[0].resolve().as_posix() if candidates else "")
          PY
          )

          if [ -z "$ZONO_BIN" ]; then
            echo "Could not locate the built zono-benchmark binary" >&2
            exit 1
          fi

          ZONO_SIZE=$(du -sh "$ZONO_BIN" | cut -f1)
          ZONO_BYTES=$(stat --format=%s "$ZONO_BIN")
          ZONO_FILES=$( (find src examples -name '*.zig'; echo lib.zig) | wc -l )

          "$ZONO_BIN" &
          ZONO_PID=$!
          trap 'kill $ZONO_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3003/api/json >/dev/null && curl -fsS http://127.0.0.1:3003/api/context-json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "zono benchmark server did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          run_wrk_median() {
            local url="$1"
            local result_file
            result_file=$(mktemp)
            local rss_kb
            rss_kb=$(read_rss_kb "$ZONO_PID")

            echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s ${url}" >&2
            wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" "$url" >/dev/null

            for run in $(seq 1 "$BENCH_RUNS"); do
              echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s ${url}" >&2
              WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" "$url")
              echo "$WRK_OUT" >&2

              RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
              LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
              printf '%s\t%s\t%s\n' "$run" "$RPS" "$LAT" >> "$result_file"

              RSS_AFTER=$(read_rss_kb "$ZONO_PID")
              if [ "$RSS_AFTER" -gt "$rss_kb" ]; then
                rss_kb=$RSS_AFTER
              fi
            done

            MEDIAN_ROW=$(sort -k2,2n "$result_file" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
            RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
            LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
            rm -f "$result_file"
            printf '%s\t%s\t%s\n' "$RPS" "$LAT" "$rss_kb"
          }

          IFS=$'\t' read -r ZONO_RPS ZONO_LAT ZONO_RSS_KB <<< "$(run_wrk_median http://127.0.0.1:3003/api/json)"
          IFS=$'\t' read -r ZONO_CONTEXT_RPS ZONO_CONTEXT_LAT ZONO_CONTEXT_RSS_KB <<< "$(run_wrk_median http://127.0.0.1:3003/api/context-json)"
          if [ "$ZONO_CONTEXT_RSS_KB" -gt "$ZONO_RSS_KB" ]; then
            ZONO_RSS_KB=$ZONO_CONTEXT_RSS_KB
          fi
          ZONO_RAM_MB=$(awk "BEGIN{printf \"%.1f\", ${ZONO_RSS_KB:-0} / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "binary_size=$ZONO_SIZE"
            echo "binary_bytes=$ZONO_BYTES"
            echo "source_files=$ZONO_FILES"
            echo "requests_per_sec=$ZONO_RPS"
            echo "requests_per_sec_context=$ZONO_CONTEXT_RPS"
            echo "ram_mb=$ZONO_RAM_MB"
            echo "zig_version=$ZONO_ZIG_VERSION"
            echo "avg_latency<<EOF"
            echo "$ZONO_LAT"
            echo "EOF"
            echo "avg_latency_context<<EOF"
            echo "$ZONO_CONTEXT_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  benchmark_merjs:
    runs-on: ubuntu-latest
    name: merjs API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      binary_size: ${{ steps.bench.outputs.binary_size }}
      binary_bytes: ${{ steps.bench.outputs.binary_bytes }}
      source_files: ${{ steps.bench.outputs.source_files }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      zig_version: ${{ steps.bench.outputs.zig_version }}
      baseline_ref: ${{ steps.bench.outputs.baseline_ref }}

    steps:
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.MERJS_ZIG_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark merjs
        id: bench
        env:
          MERJS_ZIG_VERSION: ${{ env.MERJS_ZIG_VERSION }}
          MERJS_BASELINE_REF: ${{ env.MERJS_BASELINE_REF }}
        run: |
          set -euo pipefail

          read_rss_kb() {
            local pid="$1"
            local rss
            rss=$(ps -o rss= -p "$pid" 2>/dev/null | tr -d ' ')
            if [ -z "$rss" ]; then
              echo 0
            else
              echo "$rss"
            fi
          }

          git init merjs-baseline
          cd merjs-baseline
          git remote add origin https://github.com/justrach/merjs.git
          git fetch --depth 1 origin "refs/tags/$MERJS_BASELINE_REF:refs/tags/$MERJS_BASELINE_REF"
          git checkout --detach "$MERJS_BASELINE_REF"
          cd ..

          # v0.2.5 ships both evented and threaded runtimes. Force the shipped
          # threaded fallback on Linux CI because the default io_uring path
          # currently fails to compile under ubuntu-latest + Zig 0.16.0.
          cp merjs-baseline/src/runtime_threaded.zig merjs-baseline/src/runtime.zig
          python3 - <<'PY'
          from pathlib import Path
          path = Path("merjs-baseline/src/runtime.zig")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "pub fn init(gpa: std.mem.Allocator) void {",
              "pub fn init(gpa: std.mem.Allocator) !void {",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY

          rm -rf merjs-baseline/examples/site/app merjs-baseline/examples/site/api
          mkdir -p merjs-baseline/examples/site/app merjs-baseline/examples/site/api
          cp merjs-baseline/examples/starter/app/*.zig merjs-baseline/examples/site/app/
          cat > merjs-baseline/examples/site/api/json.zig <<'EOF'
          const mer = @import("mer");

          const JsonResponse = struct {
              ok: bool,
              framework: []const u8,
          };

          pub fn render(req: mer.Request) mer.Response {
              return mer.typedJson(req.allocator, JsonResponse{
                  .ok = true,
                  .framework = "merjs",
              });
          }
          EOF

          cd merjs-baseline
          START=$(date +%s%N)
          zig build -Doptimize=ReleaseFast
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          MERJS_BIN="$(pwd)/zig-out/bin/merjs"
          if [ ! -f "$MERJS_BIN" ]; then
            echo "Could not locate the built merjs binary" >&2
            exit 1
          fi

          MERJS_SIZE=$(du -sh "$MERJS_BIN" | cut -f1)
          MERJS_BYTES=$(stat --format=%s "$MERJS_BIN")
          MERJS_FILES=$(find src examples/site/app examples/site/api examples/site/wasm -name '*.zig' | wc -l)

          "$MERJS_BIN" --port 3002 --no-dev &
          MERJS_PID=$!
          trap 'kill $MERJS_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3002/api/json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "merjs baseline did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s http://127.0.0.1:3002/api/json"
          wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" http://127.0.0.1:3002/api/json >/dev/null

          RESULT_FILE=$(mktemp)
          trap 'rm -f "$RESULT_FILE"; kill $MERJS_PID 2>/dev/null || true' EXIT
          MERJS_RSS_KB=$(read_rss_kb "$MERJS_PID")

          for run in $(seq 1 "$BENCH_RUNS"); do
            echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s http://127.0.0.1:3002/api/json"
            WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" http://127.0.0.1:3002/api/json)
            echo "$WRK_OUT"

            MERJS_RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
            MERJS_LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
            printf '%s\t%s\t%s\n' "$run" "$MERJS_RPS" "$MERJS_LAT" >> "$RESULT_FILE"

            MERJS_RSS_AFTER=$(read_rss_kb "$MERJS_PID")
            if [ "$MERJS_RSS_AFTER" -gt "$MERJS_RSS_KB" ]; then
              MERJS_RSS_KB=$MERJS_RSS_AFTER
            fi
          done

          MEDIAN_ROW=$(sort -k2,2n "$RESULT_FILE" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
          MERJS_RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
          MERJS_LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
          MERJS_RAM_MB=$(awk "BEGIN{printf \"%.1f\", ${MERJS_RSS_KB:-0} / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "binary_size=$MERJS_SIZE"
            echo "binary_bytes=$MERJS_BYTES"
            echo "source_files=$MERJS_FILES"
            echo "requests_per_sec=$MERJS_RPS"
            echo "ram_mb=$MERJS_RAM_MB"
            echo "zig_version=$MERJS_ZIG_VERSION"
            echo "baseline_ref=$MERJS_BASELINE_REF"
            echo "avg_latency<<EOF"
            echo "$MERJS_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  benchmark_nextjs:
    runs-on: ubuntu-latest
    name: Next.js API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      node_modules_size: ${{ steps.bench.outputs.node_modules_size }}
      node_modules_bytes: ${{ steps.bench.outputs.node_modules_bytes }}
      node_modules_files: ${{ steps.bench.outputs.node_modules_files }}
      dot_next_size: ${{ steps.bench.outputs.dot_next_size }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      bun_version: ${{ steps.bench.outputs.bun_version }}

    steps:
      - name: Setup Bun
        id: setup_bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark Next.js
        id: bench
        env:
          BUN_VERSION: ${{ steps.setup_bun.outputs.bun-version }}
        run: |
          set -euo pipefail

          read_rss_kb() {
            local pid="$1"
            local rss
            rss=$(ps -o rss= -p "$pid" 2>/dev/null | tr -d ' ')
            if [ -z "$rss" ]; then
              echo 0
            else
              echo "$rss"
            fi
          }

          bun x create-next-app@latest nextjs-baseline \
            --yes --ts --tailwind --app --eslint --use-bun
          mkdir -p nextjs-baseline/app/api/json
          cat > nextjs-baseline/app/api/json/route.ts <<'EOF'
          export async function GET() {
            return Response.json({ ok: true, framework: "nextjs" });
          }
          EOF

          cd nextjs-baseline
          START=$(date +%s%N)
          bun run build
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          NEXT_NM_SIZE=$(du -sh node_modules | cut -f1)
          NEXT_NM_BYTES=$(du -sb node_modules | cut -f1)
          NEXT_NM_FILES=$(find node_modules -type f | wc -l)
          NEXT_DOT_NEXT_SIZE=$(du -sh .next 2>/dev/null | cut -f1 || echo "N/A")

          bun run start -- --port 3001 &
          NEXT_PID=$!
          trap 'kill $NEXT_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/api/json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "Next.js baseline did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s http://127.0.0.1:3001/api/json"
          wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" http://127.0.0.1:3001/api/json >/dev/null

          RESULT_FILE=$(mktemp)
          trap 'rm -f "$RESULT_FILE"; kill $NEXT_PID 2>/dev/null || true' EXIT
          NEXT_RSS_KB=$(read_rss_kb "$NEXT_PID")

          for run in $(seq 1 "$BENCH_RUNS"); do
            echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s http://127.0.0.1:3001/api/json"
            WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" http://127.0.0.1:3001/api/json)
            echo "$WRK_OUT"

            NEXT_RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
            NEXT_LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
            printf '%s\t%s\t%s\n' "$run" "$NEXT_RPS" "$NEXT_LAT" >> "$RESULT_FILE"

            NEXT_RSS_AFTER=$(read_rss_kb "$NEXT_PID")
            if [ "$NEXT_RSS_AFTER" -gt "$NEXT_RSS_KB" ]; then
              NEXT_RSS_KB=$NEXT_RSS_AFTER
            fi
          done

          MEDIAN_ROW=$(sort -k2,2n "$RESULT_FILE" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
          NEXT_RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
          NEXT_LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
          NEXT_RAM_MB=$(awk "BEGIN{printf \"%.1f\", ${NEXT_RSS_KB:-0} / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "node_modules_size=$NEXT_NM_SIZE"
            echo "node_modules_bytes=$NEXT_NM_BYTES"
            echo "node_modules_files=$NEXT_NM_FILES"
            echo "dot_next_size=$NEXT_DOT_NEXT_SIZE"
            echo "requests_per_sec=$NEXT_RPS"
            echo "ram_mb=$NEXT_RAM_MB"
            echo "bun_version=$BUN_VERSION"
            echo "avg_latency<<EOF"
            echo "$NEXT_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  benchmark_hono:
    runs-on: ubuntu-latest
    name: Hono API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      node_modules_size: ${{ steps.bench.outputs.node_modules_size }}
      node_modules_bytes: ${{ steps.bench.outputs.node_modules_bytes }}
      node_modules_files: ${{ steps.bench.outputs.node_modules_files }}
      bundle_size: ${{ steps.bench.outputs.bundle_size }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      bun_version: ${{ steps.bench.outputs.bun_version }}
      hono_version: ${{ steps.bench.outputs.hono_version }}

    steps:
      - name: Setup Bun
        id: setup_bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark Hono
        id: bench
        env:
          BUN_VERSION: ${{ steps.setup_bun.outputs.bun-version }}
        run: |
          set -euo pipefail

          read_rss_kb() {
            local pid="$1"
            local rss
            rss=$(ps -o rss= -p "$pid" 2>/dev/null | tr -d ' ')
            if [ -z "$rss" ]; then
              echo 0
            else
              echo "$rss"
            fi
          }

          mkdir -p hono-baseline
          cd hono-baseline
          cat > package.json <<'EOF'
          {
            "name": "hono-baseline",
            "private": true,
            "type": "module",
            "dependencies": {
              "hono": "latest"
            }
          }
          EOF

          bun install

          cat > index.ts <<'EOF'
          import { Hono } from 'hono'

          const app = new Hono()

          app.get('/api/json', (c) => {
            return c.json({ ok: true, framework: 'hono' })
          })

          Bun.serve({
            port: 3004,
            fetch: app.fetch,
          })
          EOF

          HONO_VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("package.json").read_text(encoding="utf-8"))
          print(data["dependencies"]["hono"])
          PY
          )

          START=$(date +%s%N)
          mkdir -p dist
          bun build index.ts --outfile dist/server.js --target bun
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          HONO_NM_SIZE=$(du -sh node_modules | cut -f1)
          HONO_NM_BYTES=$(du -sb node_modules | cut -f1)
          HONO_NM_FILES=$(find node_modules -type f | wc -l)
          HONO_BUNDLE_SIZE=$(du -sh dist/server.js | cut -f1)

          bun dist/server.js &
          HONO_PID=$!
          trap 'kill $HONO_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3004/api/json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "Hono baseline did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s http://127.0.0.1:3004/api/json"
          wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" http://127.0.0.1:3004/api/json >/dev/null

          RESULT_FILE=$(mktemp)
          trap 'rm -f "$RESULT_FILE"; kill $HONO_PID 2>/dev/null || true' EXIT
          HONO_RSS_KB=$(read_rss_kb "$HONO_PID")

          for run in $(seq 1 "$BENCH_RUNS"); do
            echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s http://127.0.0.1:3004/api/json"
            WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" http://127.0.0.1:3004/api/json)
            echo "$WRK_OUT"

            HONO_RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
            HONO_LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
            printf '%s\t%s\t%s\n' "$run" "$HONO_RPS" "$HONO_LAT" >> "$RESULT_FILE"

            HONO_RSS_AFTER=$(read_rss_kb "$HONO_PID")
            if [ "$HONO_RSS_AFTER" -gt "$HONO_RSS_KB" ]; then
              HONO_RSS_KB=$HONO_RSS_AFTER
            fi
          done

          MEDIAN_ROW=$(sort -k2,2n "$RESULT_FILE" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
          HONO_RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
          HONO_LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
          HONO_RAM_MB=$(awk "BEGIN{printf \"%.1f\", ${HONO_RSS_KB:-0} / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "node_modules_size=$HONO_NM_SIZE"
            echo "node_modules_bytes=$HONO_NM_BYTES"
            echo "node_modules_files=$HONO_NM_FILES"
            echo "bundle_size=$HONO_BUNDLE_SIZE"
            echo "requests_per_sec=$HONO_RPS"
            echo "ram_mb=$HONO_RAM_MB"
            echo "bun_version=$BUN_VERSION"
            echo "hono_version=$HONO_VERSION"
            echo "avg_latency<<EOF"
            echo "$HONO_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  publish_benchmark:
    runs-on: ubuntu-latest
    name: Publish benchmark summary
    needs:
      - benchmark_zono
      - benchmark_merjs
      - benchmark_hono
      - benchmark_nextjs
    if: ${{ always() }}
    env:
      ZONO_RESULT: ${{ needs.benchmark_zono.result }}
      ZONO_BUILD_MS: ${{ needs.benchmark_zono.outputs.build_ms || '0' }}
      ZONO_BINARY_SIZE: ${{ needs.benchmark_zono.outputs.binary_size || 'n/a' }}
      ZONO_BINARY_BYTES: ${{ needs.benchmark_zono.outputs.binary_bytes || '0' }}
      ZONO_SOURCE_FILES: ${{ needs.benchmark_zono.outputs.source_files || '0' }}
      ZONO_RPS: ${{ needs.benchmark_zono.outputs.requests_per_sec || 'n/a' }}
      ZONO_CONTEXT_RPS: ${{ needs.benchmark_zono.outputs.requests_per_sec_context || 'n/a' }}
      ZONO_LAT: ${{ needs.benchmark_zono.outputs.avg_latency || 'n/a' }}
      ZONO_CONTEXT_LAT: ${{ needs.benchmark_zono.outputs.avg_latency_context || 'n/a' }}
      ZONO_RAM_MB: ${{ needs.benchmark_zono.outputs.ram_mb || 'n/a' }}
      ZONO_ZIG_VERSION: ${{ needs.benchmark_zono.outputs.zig_version || '0.16.0' }}

      MERJS_RESULT: ${{ needs.benchmark_merjs.result }}
      MERJS_BUILD_MS: ${{ needs.benchmark_merjs.outputs.build_ms || '0' }}
      MERJS_BINARY_SIZE: ${{ needs.benchmark_merjs.outputs.binary_size || 'n/a' }}
      MERJS_BINARY_BYTES: ${{ needs.benchmark_merjs.outputs.binary_bytes || '0' }}
      MERJS_SOURCE_FILES: ${{ needs.benchmark_merjs.outputs.source_files || '0' }}
      MERJS_RPS: ${{ needs.benchmark_merjs.outputs.requests_per_sec || 'n/a' }}
      MERJS_LAT: ${{ needs.benchmark_merjs.outputs.avg_latency || 'n/a' }}
      MERJS_RAM_MB: ${{ needs.benchmark_merjs.outputs.ram_mb || 'n/a' }}
      MERJS_ZIG_VERSION: ${{ needs.benchmark_merjs.outputs.zig_version || '0.16.0' }}
      MERJS_BASELINE_REF: ${{ needs.benchmark_merjs.outputs.baseline_ref || 'v0.2.5' }}

      HONO_RESULT: ${{ needs.benchmark_hono.result }}
      HONO_BUILD_MS: ${{ needs.benchmark_hono.outputs.build_ms || '0' }}
      HONO_NODE_MODULES_SIZE: ${{ needs.benchmark_hono.outputs.node_modules_size || 'n/a' }}
      HONO_NODE_MODULES_BYTES: ${{ needs.benchmark_hono.outputs.node_modules_bytes || '0' }}
      HONO_NODE_MODULES_FILES: ${{ needs.benchmark_hono.outputs.node_modules_files || '0' }}
      HONO_BUNDLE_SIZE: ${{ needs.benchmark_hono.outputs.bundle_size || 'n/a' }}
      HONO_RPS: ${{ needs.benchmark_hono.outputs.requests_per_sec || 'n/a' }}
      HONO_LAT: ${{ needs.benchmark_hono.outputs.avg_latency || 'n/a' }}
      HONO_RAM_MB: ${{ needs.benchmark_hono.outputs.ram_mb || 'n/a' }}
      HONO_BUN_VERSION: ${{ needs.benchmark_hono.outputs.bun_version || 'latest' }}
      HONO_VERSION: ${{ needs.benchmark_hono.outputs.hono_version || 'latest' }}

      NEXTJS_RESULT: ${{ needs.benchmark_nextjs.result }}
      NEXTJS_BUILD_MS: ${{ needs.benchmark_nextjs.outputs.build_ms || '0' }}
      NEXTJS_NODE_MODULES_SIZE: ${{ needs.benchmark_nextjs.outputs.node_modules_size || 'n/a' }}
      NEXTJS_NODE_MODULES_BYTES: ${{ needs.benchmark_nextjs.outputs.node_modules_bytes || '0' }}
      NEXTJS_NODE_MODULES_FILES: ${{ needs.benchmark_nextjs.outputs.node_modules_files || '0' }}
      NEXTJS_DOT_NEXT_SIZE: ${{ needs.benchmark_nextjs.outputs.dot_next_size || 'n/a' }}
      NEXTJS_RPS: ${{ needs.benchmark_nextjs.outputs.requests_per_sec || 'n/a' }}
      NEXTJS_LAT: ${{ needs.benchmark_nextjs.outputs.avg_latency || 'n/a' }}
      NEXTJS_RAM_MB: ${{ needs.benchmark_nextjs.outputs.ram_mb || 'n/a' }}
      NEXTJS_BUN_VERSION: ${{ needs.benchmark_nextjs.outputs.bun_version || 'latest' }}

    steps:
      - name: Checkout zono
        uses: actions/checkout@v4

      - name: Post comparison
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Backend API Benchmark

          Target routes:
          `GET /api/json` for zono, merjs, Hono, and Next.js
          `GET /api/context-json` for zono Context handlers

          Response shape:
          `{ "ok": true, "framework": "..." }`

          ### Job status

          | Target | Status | Toolchain |
          |--------|--------|-----------|
          EOF

          echo "| zono | $ZONO_RESULT | Zig $ZONO_ZIG_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| merjs | $MERJS_RESULT | Zig $MERJS_ZIG_VERSION (\`$MERJS_BASELINE_REF\` release) |" >> $GITHUB_STEP_SUMMARY
          echo "| Hono | $HONO_RESULT | Bun $HONO_BUN_VERSION + Hono $HONO_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js | $NEXTJS_RESULT | Bun $NEXTJS_BUN_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ### Results

          | Metric | **zono** | **merjs** | **Hono** | **Next.js** |
          |--------|----------|-----------|----------|-------------|
          EOF

          echo "| Server binary / node_modules | $ZONO_BINARY_SIZE | $MERJS_BINARY_SIZE | $HONO_NODE_MODULES_SIZE | $NEXTJS_NODE_MODULES_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Build output | - | - | $HONO_BUNDLE_SIZE (dist/server.js) | $NEXTJS_DOT_NEXT_SIZE (.next/) |" >> $GITHUB_STEP_SUMMARY
          echo "| Source files / node_modules files | $ZONO_SOURCE_FILES files | $MERJS_SOURCE_FILES files | $HONO_NODE_MODULES_FILES files | $NEXTJS_NODE_MODULES_FILES files |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime deps | 0 | 0 | Bun $HONO_BUN_VERSION + Hono $HONO_VERSION | Bun $NEXTJS_BUN_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Requests/sec** (wrk median, ${BENCH_THREADS}t/${BENCH_CONNECTIONS}c/${BENCH_DURATION_SECONDS}s) | **${ZONO_RPS}** | **${MERJS_RPS}** | **${HONO_RPS}** | **${NEXTJS_RPS}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Requests/sec (context route)** | **${ZONO_CONTEXT_RPS}** | - | - | - |" >> $GITHUB_STEP_SUMMARY
          echo "| **Avg latency** | **${ZONO_LAT}** | **${MERJS_LAT}** | **${HONO_LAT}** | **${NEXTJS_LAT}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Avg latency (context route)** | **${ZONO_CONTEXT_LAT}** | - | - | - |" >> $GITHUB_STEP_SUMMARY
          echo "| **RAM usage** (under load) | **${ZONO_RAM_MB} MB** | **${MERJS_RAM_MB} MB** | **${HONO_RAM_MB} MB** | **${NEXTJS_RAM_MB} MB** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Four isolated benchmark jobs run in parallel. Each target gets one ${BENCH_WARMUP_SECONDS}s warmup plus ${BENCH_RUNS} measured wrk runs, and the published Requests/sec is the median run with its matching latency. merjs uses upstream release tag \`$MERJS_BASELINE_REF\`; Linux CI switches to its shipped threaded runtime fallback because the default io_uring path currently fails to compile under ubuntu-latest." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any benchmark job failed
        if: ${{ needs.benchmark_zono.result != 'success' || needs.benchmark_merjs.result != 'success' || needs.benchmark_hono.result != 'success' || needs.benchmark_nextjs.result != 'success' }}
        run: |
          echo "::error::One or more benchmark jobs failed; README and benchmarks/latest.json were not updated."
          exit 1

      - name: Save benchmark JSON
        run: |
          mkdir -p benchmarks
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          data = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "runner": "ubuntu-latest",
              "benchmark": {
                  "tool": "wrk",
                  "threads": int(os.environ["BENCH_THREADS"]),
                  "connections": int(os.environ["BENCH_CONNECTIONS"]),
                  "duration_seconds": int(os.environ["BENCH_DURATION_SECONDS"]),
                  "warmup_seconds": int(os.environ["BENCH_WARMUP_SECONDS"]),
                  "runs": int(os.environ["BENCH_RUNS"]),
                  "aggregation": "median_requests_per_sec_with_matching_latency",
              },
              "target": {
                  "zono_route": "/api/json",
                  "zono_context_route": "/api/context-json",
                  "merjs_route": "/api/json",
                  "hono_route": "/api/json",
                  "nextjs_route": "/api/json",
                  "example": "benchmark",
              },
              "zono": {
                  "requests_per_sec": float(os.environ["ZONO_RPS"]),
                  "avg_latency_ms": os.environ["ZONO_LAT"],
                  "ram_mb": float(os.environ["ZONO_RAM_MB"]),
                  "binary_size": os.environ["ZONO_BINARY_SIZE"],
                  "binary_bytes": int(os.environ["ZONO_BINARY_BYTES"]),
                  "source_files": int(os.environ["ZONO_SOURCE_FILES"]),
                  "zig_version": os.environ["ZONO_ZIG_VERSION"],
              },
              "zono_context": {
                  "requests_per_sec": float(os.environ["ZONO_CONTEXT_RPS"]),
                  "avg_latency_ms": os.environ["ZONO_CONTEXT_LAT"],
              },
              "merjs": {
                  "requests_per_sec": float(os.environ["MERJS_RPS"]),
                  "avg_latency_ms": os.environ["MERJS_LAT"],
                  "ram_mb": float(os.environ["MERJS_RAM_MB"]),
                  "binary_size": os.environ["MERJS_BINARY_SIZE"],
                  "binary_bytes": int(os.environ["MERJS_BINARY_BYTES"]),
                  "source_files": int(os.environ["MERJS_SOURCE_FILES"]),
                  "zig_version": os.environ["MERJS_ZIG_VERSION"],
                  "baseline_ref": os.environ["MERJS_BASELINE_REF"],
              },
              "hono": {
                  "requests_per_sec": float(os.environ["HONO_RPS"]),
                  "avg_latency_ms": os.environ["HONO_LAT"],
                  "ram_mb": float(os.environ["HONO_RAM_MB"]),
                  "node_modules_size": os.environ["HONO_NODE_MODULES_SIZE"],
                  "node_modules_bytes": int(os.environ["HONO_NODE_MODULES_BYTES"]),
                  "node_modules_files": int(os.environ["HONO_NODE_MODULES_FILES"]),
                  "bundle_size": os.environ["HONO_BUNDLE_SIZE"],
                  "bun_version": os.environ["HONO_BUN_VERSION"],
                  "hono_version": os.environ["HONO_VERSION"],
              },
              "nextjs": {
                  "requests_per_sec": float(os.environ["NEXTJS_RPS"]),
                  "avg_latency_ms": os.environ["NEXTJS_LAT"],
                  "ram_mb": float(os.environ["NEXTJS_RAM_MB"]),
                  "node_modules_size": os.environ["NEXTJS_NODE_MODULES_SIZE"],
                  "node_modules_bytes": int(os.environ["NEXTJS_NODE_MODULES_BYTES"]),
                  "node_modules_files": int(os.environ["NEXTJS_NODE_MODULES_FILES"]),
                  "dot_next_size": os.environ["NEXTJS_DOT_NEXT_SIZE"],
                  "bun_version": os.environ["NEXTJS_BUN_VERSION"],
              },
          }

          with open("benchmarks/latest.json", "w", encoding="utf-8") as fh:
              json.dump(data, fh, indent=2)
          print(json.dumps(data, indent=2))
          PY

      - name: Update README benchmark table
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python3 - <<'PY'
          import os
          import re

          block = "\n".join([
              "| Metric | **zono** | **merjs** | **Hono** | **Next.js** |",
              "|--------|----------|-----------|----------|-------------|",
              f'| Requests/sec (wrk median) | **{os.environ["ZONO_RPS"]}** | **{os.environ["MERJS_RPS"]}** | **{os.environ["HONO_RPS"]}** | **{os.environ["NEXTJS_RPS"]}** |',
              f'| Requests/sec (context route) | **{os.environ["ZONO_CONTEXT_RPS"]}** | - | - | - |',
              f'| Avg latency | **{os.environ["ZONO_LAT"]}** | **{os.environ["MERJS_LAT"]}** | **{os.environ["HONO_LAT"]}** | **{os.environ["NEXTJS_LAT"]}** |',
              f'| Avg latency (context route) | **{os.environ["ZONO_CONTEXT_LAT"]}** | - | - | - |',
              f'| RAM usage (under load) | **{os.environ["ZONO_RAM_MB"]} MB** | **{os.environ["MERJS_RAM_MB"]} MB** | **{os.environ["HONO_RAM_MB"]} MB** | **{os.environ["NEXTJS_RAM_MB"]} MB** |',
          ])

          with open("README.md", "r", encoding="utf-8") as fh:
              txt = fh.read()

          txt = re.sub(
              r'<!-- BENCH:START -->\n.*?\n<!-- BENCH:END -->',
              lambda _: f"<!-- BENCH:START -->\n{block}\n<!-- BENCH:END -->",
              txt,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as fh:
              fh.write(txt)
          PY

      - name: Commit updated benchmark snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md benchmarks/latest.json
          git diff --staged --quiet || (git commit -m "bench: update latest benchmark snapshot [skip ci]" && git push)
