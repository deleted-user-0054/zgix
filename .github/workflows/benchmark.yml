name: Benchmark - zgix vs merjs vs Next.js

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  ZGIX_ZIG_VERSION: 0.16.0
  MERJS_ZIG_VERSION: 0.16.0
  MERJS_BASELINE_REF: v0.2.5
  BUN_VERSION: latest
  BENCH_THREADS: 2
  BENCH_CONNECTIONS: 100
  BENCH_DURATION_SECONDS: 10
  BENCH_WARMUP_SECONDS: 3
  BENCH_RUNS: 3

jobs:
  benchmark_zgix:
    runs-on: ubuntu-latest
    name: zgix API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      binary_size: ${{ steps.bench.outputs.binary_size }}
      binary_bytes: ${{ steps.bench.outputs.binary_bytes }}
      source_files: ${{ steps.bench.outputs.source_files }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      zig_version: ${{ steps.bench.outputs.zig_version }}

    steps:
      - name: Checkout zgix
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZGIX_ZIG_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark zgix
        id: bench
        env:
          ZGIX_ZIG_VERSION: ${{ env.ZGIX_ZIG_VERSION }}
        run: |
          set -euo pipefail

          START=$(date +%s%N)
          zig build example-benchmark -Doptimize=ReleaseFast
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          ZGIX_BIN=$(python3 - <<'PY'
          from pathlib import Path

          candidates = []
          for path in Path(".zig-cache").rglob("*"):
              if path.is_file() and path.name in {"zgix-benchmark", "zgix-benchmark.exe"}:
                  candidates.append(path)

          candidates.sort(key=lambda p: p.stat().st_mtime, reverse=True)
          print(candidates[0].resolve().as_posix() if candidates else "")
          PY
          )

          if [ -z "$ZGIX_BIN" ]; then
            echo "Could not locate the built zgix-benchmark binary" >&2
            exit 1
          fi

          ZGIX_SIZE=$(du -sh "$ZGIX_BIN" | cut -f1)
          ZGIX_BYTES=$(stat --format=%s "$ZGIX_BIN")
          ZGIX_FILES=$( (find src examples -name '*.zig'; echo lib.zig) | wc -l )

          "$ZGIX_BIN" &
          ZGIX_PID=$!
          trap 'kill $ZGIX_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3003/api/json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "zgix benchmark server did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s http://127.0.0.1:3003/api/json"
          wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" http://127.0.0.1:3003/api/json >/dev/null

          RESULT_FILE=$(mktemp)
          trap 'rm -f "$RESULT_FILE"; kill $ZGIX_PID 2>/dev/null || true' EXIT
          ZGIX_RSS_KB=$(ps -o rss= -p "$ZGIX_PID" | tr -d ' ')

          for run in $(seq 1 "$BENCH_RUNS"); do
            echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s http://127.0.0.1:3003/api/json"
            WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" http://127.0.0.1:3003/api/json)
            echo "$WRK_OUT"

            ZGIX_RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
            ZGIX_LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
            printf '%s\t%s\t%s\n' "$run" "$ZGIX_RPS" "$ZGIX_LAT" >> "$RESULT_FILE"

            ZGIX_RSS_AFTER=$(ps -o rss= -p "$ZGIX_PID" | tr -d ' ')
            if [ "$ZGIX_RSS_AFTER" -gt "$ZGIX_RSS_KB" ]; then
              ZGIX_RSS_KB=$ZGIX_RSS_AFTER
            fi
          done

          MEDIAN_ROW=$(sort -k2,2n "$RESULT_FILE" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
          ZGIX_RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
          ZGIX_LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
          ZGIX_RAM_MB=$(awk "BEGIN{printf \"%.1f\", $ZGIX_RSS_KB / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "binary_size=$ZGIX_SIZE"
            echo "binary_bytes=$ZGIX_BYTES"
            echo "source_files=$ZGIX_FILES"
            echo "requests_per_sec=$ZGIX_RPS"
            echo "ram_mb=$ZGIX_RAM_MB"
            echo "zig_version=$ZGIX_ZIG_VERSION"
            echo "avg_latency<<EOF"
            echo "$ZGIX_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  benchmark_merjs:
    runs-on: ubuntu-latest
    name: merjs API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      binary_size: ${{ steps.bench.outputs.binary_size }}
      binary_bytes: ${{ steps.bench.outputs.binary_bytes }}
      source_files: ${{ steps.bench.outputs.source_files }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      zig_version: ${{ steps.bench.outputs.zig_version }}
      baseline_ref: ${{ steps.bench.outputs.baseline_ref }}

    steps:
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.MERJS_ZIG_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark merjs
        id: bench
        env:
          MERJS_ZIG_VERSION: ${{ env.MERJS_ZIG_VERSION }}
          MERJS_BASELINE_REF: ${{ env.MERJS_BASELINE_REF }}
        run: |
          set -euo pipefail

          git init merjs-baseline
          cd merjs-baseline
          git remote add origin https://github.com/justrach/merjs.git
          git fetch --depth 1 origin "refs/tags/$MERJS_BASELINE_REF:refs/tags/$MERJS_BASELINE_REF"
          git checkout --detach "$MERJS_BASELINE_REF"
          cd ..

          # v0.2.5 ships both evented and threaded runtimes. Force the shipped
          # threaded fallback on Linux CI because the default io_uring path
          # currently fails to compile under ubuntu-latest + Zig 0.16.0.
          cp merjs-baseline/src/runtime_threaded.zig merjs-baseline/src/runtime.zig
          python3 - <<'PY'
          from pathlib import Path
          path = Path("merjs-baseline/src/runtime.zig")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "pub fn init(gpa: std.mem.Allocator) void {",
              "pub fn init(gpa: std.mem.Allocator) !void {",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY

          rm -rf merjs-baseline/examples/site/app merjs-baseline/examples/site/api
          mkdir -p merjs-baseline/examples/site/app merjs-baseline/examples/site/api
          cp merjs-baseline/examples/starter/app/*.zig merjs-baseline/examples/site/app/
          cat > merjs-baseline/examples/site/api/json.zig <<'EOF'
          const mer = @import("mer");

          const JsonResponse = struct {
              ok: bool,
              framework: []const u8,
          };

          pub fn render(req: mer.Request) mer.Response {
              return mer.typedJson(req.allocator, JsonResponse{
                  .ok = true,
                  .framework = "merjs",
              });
          }
          EOF

          cd merjs-baseline
          START=$(date +%s%N)
          zig build -Doptimize=ReleaseFast
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          MERJS_BIN="$(pwd)/zig-out/bin/merjs"
          if [ ! -f "$MERJS_BIN" ]; then
            echo "Could not locate the built merjs binary" >&2
            exit 1
          fi

          MERJS_SIZE=$(du -sh "$MERJS_BIN" | cut -f1)
          MERJS_BYTES=$(stat --format=%s "$MERJS_BIN")
          MERJS_FILES=$(find src examples/site/app examples/site/api examples/site/wasm -name '*.zig' | wc -l)

          "$MERJS_BIN" --port 3002 --no-dev &
          MERJS_PID=$!
          trap 'kill $MERJS_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3002/api/json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "merjs baseline did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s http://127.0.0.1:3002/api/json"
          wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" http://127.0.0.1:3002/api/json >/dev/null

          RESULT_FILE=$(mktemp)
          trap 'rm -f "$RESULT_FILE"; kill $MERJS_PID 2>/dev/null || true' EXIT
          MERJS_RSS_KB=$(ps -o rss= -p "$MERJS_PID" | tr -d ' ')

          for run in $(seq 1 "$BENCH_RUNS"); do
            echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s http://127.0.0.1:3002/api/json"
            WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" http://127.0.0.1:3002/api/json)
            echo "$WRK_OUT"

            MERJS_RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
            MERJS_LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
            printf '%s\t%s\t%s\n' "$run" "$MERJS_RPS" "$MERJS_LAT" >> "$RESULT_FILE"

            MERJS_RSS_AFTER=$(ps -o rss= -p "$MERJS_PID" | tr -d ' ')
            if [ "$MERJS_RSS_AFTER" -gt "$MERJS_RSS_KB" ]; then
              MERJS_RSS_KB=$MERJS_RSS_AFTER
            fi
          done

          MEDIAN_ROW=$(sort -k2,2n "$RESULT_FILE" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
          MERJS_RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
          MERJS_LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
          MERJS_RAM_MB=$(awk "BEGIN{printf \"%.1f\", $MERJS_RSS_KB / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "binary_size=$MERJS_SIZE"
            echo "binary_bytes=$MERJS_BYTES"
            echo "source_files=$MERJS_FILES"
            echo "requests_per_sec=$MERJS_RPS"
            echo "ram_mb=$MERJS_RAM_MB"
            echo "zig_version=$MERJS_ZIG_VERSION"
            echo "baseline_ref=$MERJS_BASELINE_REF"
            echo "avg_latency<<EOF"
            echo "$MERJS_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  benchmark_nextjs:
    runs-on: ubuntu-latest
    name: Next.js API benchmark
    outputs:
      build_ms: ${{ steps.bench.outputs.build_ms }}
      node_modules_size: ${{ steps.bench.outputs.node_modules_size }}
      node_modules_bytes: ${{ steps.bench.outputs.node_modules_bytes }}
      node_modules_files: ${{ steps.bench.outputs.node_modules_files }}
      dot_next_size: ${{ steps.bench.outputs.dot_next_size }}
      requests_per_sec: ${{ steps.bench.outputs.requests_per_sec }}
      avg_latency: ${{ steps.bench.outputs.avg_latency }}
      ram_mb: ${{ steps.bench.outputs.ram_mb }}
      bun_version: ${{ steps.bench.outputs.bun_version }}

    steps:
      - name: Setup Bun
        id: setup_bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Benchmark Next.js
        id: bench
        env:
          BUN_VERSION: ${{ steps.setup_bun.outputs.bun-version }}
        run: |
          set -euo pipefail

          bun x create-next-app@latest nextjs-baseline \
            --yes --ts --tailwind --app --eslint --use-bun
          mkdir -p nextjs-baseline/app/api/json
          cat > nextjs-baseline/app/api/json/route.ts <<'EOF'
          export async function GET() {
            return Response.json({ ok: true, framework: "nextjs" });
          }
          EOF

          cd nextjs-baseline
          START=$(date +%s%N)
          bun run build
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))

          NEXT_NM_SIZE=$(du -sh node_modules | cut -f1)
          NEXT_NM_BYTES=$(du -sb node_modules | cut -f1)
          NEXT_NM_FILES=$(find node_modules -type f | wc -l)
          NEXT_DOT_NEXT_SIZE=$(du -sh .next 2>/dev/null | cut -f1 || echo "N/A")

          bun run start -- --port 3001 &
          NEXT_PID=$!
          trap 'kill $NEXT_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/api/json >/dev/null; then
              break
            fi
            sleep 1
            if [ "$attempt" -eq 30 ]; then
              echo "Next.js baseline did not become ready in time" >&2
              exit 1
            fi
          done

          if [ $((BENCH_RUNS % 2)) -eq 0 ]; then
            echo "BENCH_RUNS must be an odd number to compute a median" >&2
            exit 1
          fi

          echo "Warmup run: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_WARMUP_SECONDS}s http://127.0.0.1:3001/api/json"
          wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_WARMUP_SECONDS}s" http://127.0.0.1:3001/api/json >/dev/null

          RESULT_FILE=$(mktemp)
          trap 'rm -f "$RESULT_FILE"; kill $NEXT_PID 2>/dev/null || true' EXIT
          NEXT_RSS_KB=$(ps -o rss= -p "$NEXT_PID" | tr -d ' ')

          for run in $(seq 1 "$BENCH_RUNS"); do
            echo "Measured run $run/$BENCH_RUNS: wrk -t${BENCH_THREADS} -c${BENCH_CONNECTIONS} -d${BENCH_DURATION_SECONDS}s http://127.0.0.1:3001/api/json"
            WRK_OUT=$(wrk -t"$BENCH_THREADS" -c"$BENCH_CONNECTIONS" -d"${BENCH_DURATION_SECONDS}s" http://127.0.0.1:3001/api/json)
            echo "$WRK_OUT"

            NEXT_RPS=$(echo "$WRK_OUT" | awk '/Requests\/sec/ {print $2}')
            NEXT_LAT=$(echo "$WRK_OUT" | awk '/Latency/ {print $2 " " $3}')
            printf '%s\t%s\t%s\n' "$run" "$NEXT_RPS" "$NEXT_LAT" >> "$RESULT_FILE"

            NEXT_RSS_AFTER=$(ps -o rss= -p "$NEXT_PID" | tr -d ' ')
            if [ "$NEXT_RSS_AFTER" -gt "$NEXT_RSS_KB" ]; then
              NEXT_RSS_KB=$NEXT_RSS_AFTER
            fi
          done

          MEDIAN_ROW=$(sort -k2,2n "$RESULT_FILE" | sed -n "$(( (BENCH_RUNS + 1) / 2 ))p")
          NEXT_RPS=$(printf '%s' "$MEDIAN_ROW" | cut -f2)
          NEXT_LAT=$(printf '%s' "$MEDIAN_ROW" | cut -f3-)
          NEXT_RAM_MB=$(awk "BEGIN{printf \"%.1f\", $NEXT_RSS_KB / 1024}")

          {
            echo "build_ms=$BUILD_MS"
            echo "node_modules_size=$NEXT_NM_SIZE"
            echo "node_modules_bytes=$NEXT_NM_BYTES"
            echo "node_modules_files=$NEXT_NM_FILES"
            echo "dot_next_size=$NEXT_DOT_NEXT_SIZE"
            echo "requests_per_sec=$NEXT_RPS"
            echo "ram_mb=$NEXT_RAM_MB"
            echo "bun_version=$BUN_VERSION"
            echo "avg_latency<<EOF"
            echo "$NEXT_LAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  publish_benchmark:
    runs-on: ubuntu-latest
    name: Publish benchmark summary
    needs:
      - benchmark_zgix
      - benchmark_merjs
      - benchmark_nextjs
    if: ${{ always() }}
    env:
      ZGIX_RESULT: ${{ needs.benchmark_zgix.result }}
      ZGIX_BUILD_MS: ${{ needs.benchmark_zgix.outputs.build_ms || '0' }}
      ZGIX_BINARY_SIZE: ${{ needs.benchmark_zgix.outputs.binary_size || 'n/a' }}
      ZGIX_BINARY_BYTES: ${{ needs.benchmark_zgix.outputs.binary_bytes || '0' }}
      ZGIX_SOURCE_FILES: ${{ needs.benchmark_zgix.outputs.source_files || '0' }}
      ZGIX_RPS: ${{ needs.benchmark_zgix.outputs.requests_per_sec || 'n/a' }}
      ZGIX_LAT: ${{ needs.benchmark_zgix.outputs.avg_latency || 'n/a' }}
      ZGIX_RAM_MB: ${{ needs.benchmark_zgix.outputs.ram_mb || 'n/a' }}
      ZGIX_ZIG_VERSION: ${{ needs.benchmark_zgix.outputs.zig_version || '0.16.0' }}

      MERJS_RESULT: ${{ needs.benchmark_merjs.result }}
      MERJS_BUILD_MS: ${{ needs.benchmark_merjs.outputs.build_ms || '0' }}
      MERJS_BINARY_SIZE: ${{ needs.benchmark_merjs.outputs.binary_size || 'n/a' }}
      MERJS_BINARY_BYTES: ${{ needs.benchmark_merjs.outputs.binary_bytes || '0' }}
      MERJS_SOURCE_FILES: ${{ needs.benchmark_merjs.outputs.source_files || '0' }}
      MERJS_RPS: ${{ needs.benchmark_merjs.outputs.requests_per_sec || 'n/a' }}
      MERJS_LAT: ${{ needs.benchmark_merjs.outputs.avg_latency || 'n/a' }}
      MERJS_RAM_MB: ${{ needs.benchmark_merjs.outputs.ram_mb || 'n/a' }}
      MERJS_ZIG_VERSION: ${{ needs.benchmark_merjs.outputs.zig_version || '0.16.0' }}
      MERJS_BASELINE_REF: ${{ needs.benchmark_merjs.outputs.baseline_ref || 'v0.2.5' }}

      NEXTJS_RESULT: ${{ needs.benchmark_nextjs.result }}
      NEXTJS_BUILD_MS: ${{ needs.benchmark_nextjs.outputs.build_ms || '0' }}
      NEXTJS_NODE_MODULES_SIZE: ${{ needs.benchmark_nextjs.outputs.node_modules_size || 'n/a' }}
      NEXTJS_NODE_MODULES_BYTES: ${{ needs.benchmark_nextjs.outputs.node_modules_bytes || '0' }}
      NEXTJS_NODE_MODULES_FILES: ${{ needs.benchmark_nextjs.outputs.node_modules_files || '0' }}
      NEXTJS_DOT_NEXT_SIZE: ${{ needs.benchmark_nextjs.outputs.dot_next_size || 'n/a' }}
      NEXTJS_RPS: ${{ needs.benchmark_nextjs.outputs.requests_per_sec || 'n/a' }}
      NEXTJS_LAT: ${{ needs.benchmark_nextjs.outputs.avg_latency || 'n/a' }}
      NEXTJS_RAM_MB: ${{ needs.benchmark_nextjs.outputs.ram_mb || 'n/a' }}
      NEXTJS_BUN_VERSION: ${{ needs.benchmark_nextjs.outputs.bun_version || 'latest' }}

    steps:
      - name: Checkout zgix
        uses: actions/checkout@v4

      - name: Post comparison
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Backend API Benchmark

          Target route:
          `GET /api/json` for zgix, merjs, and Next.js

          Response shape:
          `{ "ok": true, "framework": "..." }`

          ### Job status

          | Target | Status | Toolchain |
          |--------|--------|-----------|
          EOF

          echo "| zgix | $ZGIX_RESULT | Zig $ZGIX_ZIG_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| merjs | $MERJS_RESULT | Zig $MERJS_ZIG_VERSION (\`$MERJS_BASELINE_REF\` release) |" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js | $NEXTJS_RESULT | Bun $NEXTJS_BUN_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ### Results

          | Metric | **zgix** | **merjs** | **Next.js** |
          |--------|----------|-----------|-------------|
          EOF

          echo "| Server binary / node_modules | $ZGIX_BINARY_SIZE | $MERJS_BINARY_SIZE | $NEXTJS_NODE_MODULES_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Build output | - | - | $NEXTJS_DOT_NEXT_SIZE (.next/) |" >> $GITHUB_STEP_SUMMARY
          echo "| Source files / node_modules files | $ZGIX_SOURCE_FILES files | $MERJS_SOURCE_FILES files | $NEXTJS_NODE_MODULES_FILES files |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime deps | 0 | 0 | Bun $NEXTJS_BUN_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Requests/sec** (wrk median, ${BENCH_THREADS}t/${BENCH_CONNECTIONS}c/${BENCH_DURATION_SECONDS}s) | **${ZGIX_RPS}** | **${MERJS_RPS}** | **${NEXTJS_RPS}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Avg latency** | **${ZGIX_LAT}** | **${MERJS_LAT}** | **${NEXTJS_LAT}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **RAM usage** (under load) | **${ZGIX_RAM_MB} MB** | **${MERJS_RAM_MB} MB** | **${NEXTJS_RAM_MB} MB** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Three isolated benchmark jobs run in parallel. Each target gets one ${BENCH_WARMUP_SECONDS}s warmup plus ${BENCH_RUNS} measured wrk runs, and the published Requests/sec is the median run with its matching latency. merjs uses upstream release tag \`$MERJS_BASELINE_REF\`; Linux CI switches to its shipped threaded runtime fallback because the default io_uring path currently fails to compile under ubuntu-latest." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any benchmark job failed
        if: ${{ needs.benchmark_zgix.result != 'success' || needs.benchmark_merjs.result != 'success' || needs.benchmark_nextjs.result != 'success' }}
        run: |
          echo "::error::One or more benchmark jobs failed; README and benchmarks/latest.json were not updated."
          exit 1

      - name: Save benchmark JSON
        run: |
          mkdir -p benchmarks
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          data = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "runner": "ubuntu-latest",
              "benchmark": {
                  "tool": "wrk",
                  "threads": int(os.environ["BENCH_THREADS"]),
                  "connections": int(os.environ["BENCH_CONNECTIONS"]),
                  "duration_seconds": int(os.environ["BENCH_DURATION_SECONDS"]),
                  "warmup_seconds": int(os.environ["BENCH_WARMUP_SECONDS"]),
                  "runs": int(os.environ["BENCH_RUNS"]),
                  "aggregation": "median_requests_per_sec_with_matching_latency",
              },
              "target": {
                  "zgix_route": "/api/json",
                  "merjs_route": "/api/json",
                  "nextjs_route": "/api/json",
                  "example": "benchmark",
              },
              "zgix": {
                  "requests_per_sec": float(os.environ["ZGIX_RPS"]),
                  "avg_latency_ms": os.environ["ZGIX_LAT"],
                  "ram_mb": float(os.environ["ZGIX_RAM_MB"]),
                  "binary_size": os.environ["ZGIX_BINARY_SIZE"],
                  "binary_bytes": int(os.environ["ZGIX_BINARY_BYTES"]),
                  "source_files": int(os.environ["ZGIX_SOURCE_FILES"]),
                  "zig_version": os.environ["ZGIX_ZIG_VERSION"],
              },
              "merjs": {
                  "requests_per_sec": float(os.environ["MERJS_RPS"]),
                  "avg_latency_ms": os.environ["MERJS_LAT"],
                  "ram_mb": float(os.environ["MERJS_RAM_MB"]),
                  "binary_size": os.environ["MERJS_BINARY_SIZE"],
                  "binary_bytes": int(os.environ["MERJS_BINARY_BYTES"]),
                  "source_files": int(os.environ["MERJS_SOURCE_FILES"]),
                  "zig_version": os.environ["MERJS_ZIG_VERSION"],
                  "baseline_ref": os.environ["MERJS_BASELINE_REF"],
              },
              "nextjs": {
                  "requests_per_sec": float(os.environ["NEXTJS_RPS"]),
                  "avg_latency_ms": os.environ["NEXTJS_LAT"],
                  "ram_mb": float(os.environ["NEXTJS_RAM_MB"]),
                  "node_modules_size": os.environ["NEXTJS_NODE_MODULES_SIZE"],
                  "node_modules_bytes": int(os.environ["NEXTJS_NODE_MODULES_BYTES"]),
                  "node_modules_files": int(os.environ["NEXTJS_NODE_MODULES_FILES"]),
                  "dot_next_size": os.environ["NEXTJS_DOT_NEXT_SIZE"],
                  "bun_version": os.environ["NEXTJS_BUN_VERSION"],
              },
          }

          with open("benchmarks/latest.json", "w", encoding="utf-8") as fh:
              json.dump(data, fh, indent=2)
          print(json.dumps(data, indent=2))
          PY

      - name: Update README benchmark table
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python3 - <<'PY'
          import os
          import re

          block = "\n".join([
              "| Metric | **zgix** | **merjs** | **Next.js** |",
              "|--------|----------|-----------|-------------|",
              f'| Requests/sec (wrk median) | **{os.environ["ZGIX_RPS"]}** | **{os.environ["MERJS_RPS"]}** | **{os.environ["NEXTJS_RPS"]}** |',
              f'| Avg latency | **{os.environ["ZGIX_LAT"]}** | **{os.environ["MERJS_LAT"]}** | **{os.environ["NEXTJS_LAT"]}** |',
              f'| RAM usage (under load) | **{os.environ["ZGIX_RAM_MB"]} MB** | **{os.environ["MERJS_RAM_MB"]} MB** | **{os.environ["NEXTJS_RAM_MB"]} MB** |',
          ])

          with open("README.md", "r", encoding="utf-8") as fh:
              txt = fh.read()

          txt = re.sub(
              r'<!-- BENCH:START -->\n.*?\n<!-- BENCH:END -->',
              lambda _: f"<!-- BENCH:START -->\n{block}\n<!-- BENCH:END -->",
              txt,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as fh:
              fh.write(txt)
          PY

      - name: Commit updated benchmark snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md benchmarks/latest.json
          git diff --staged --quiet || (git commit -m "bench: update latest benchmark snapshot [skip ci]" && git push)
